<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IGGY – ICCT Chatbot Support</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-brand">
      <img src="Iggy.png" alt="Iggy" class="welcome-icon-img" />
      <div class="brand-text">
        <span class="brand-name">IGGY</span>
        <span class="brand-tagline">ICCT Chatbot Support</span>
      </div>
    </div>
    <nav class="header-nav">
      <a href="about.html" class="nav-link" data-page="about">About</a>
      <a href="login.html" class="nav-link" id="nav-login-btn">Login</a>
      <a href="register.html" class="nav-link" id="nav-register-btn">Register</a>
      <div class="profile-menu" id="profile-menu" style="display:none;">
        <button class="profile-btn" id="profile-btn" onclick="ChatApp.toggleProfile()">
          <div class="profile-avatar" id="profile-avatar">👤</div>
          <span id="profile-name">Guest</span> ▾
        </button>
        <div class="profile-dropdown" id="profile-dropdown">
          <div class="profile-card">
            <div class="profile-avatar-lg" id="profile-avatar-lg">👤</div>
            <div class="profile-info">
              <div class="profile-fullname" id="profile-fullname">Guest User</div>
              <div class="profile-email" id="profile-email">—</div>
              <div class="profile-studentid" id="profile-studentid"></div>
            </div>
          </div>
          <div class="profile-divider"></div>
          <button class="profile-logout" onclick="ChatApp.logout()">🚪 Logout</button>
        </div>
      </div>
    </nav>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h3 class="sidebar-title">Quick Topics</h3>
      <ul class="topic-list" id="topic-list">
        <li class="topic-item" data-query="How do I enroll at ICCT Colleges?">
          <span class="topic-icon"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
              <path d="M6 12v5c3 3 9 3 12 0v-5" />
            </svg></span>
          Enrollment
        </li>
        <li class="topic-item" data-query="What are the admission requirements?">
          <span class="topic-icon"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg></span>
          Requirements
        </li>
        <li class="topic-item" data-query="What courses are available at ICCT?">
          <span class="topic-icon"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg></span>
          Courses
        </li>
        <li class="topic-item" data-query="What is the class schedule format?">
          <span class="topic-icon"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg></span>
          Schedules
        </li>
        <li class="topic-item" data-query="What are the tuition fees and payment options?">
          <span class="topic-icon"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="1" x2="12" y2="23" />
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
            </svg></span>
          Tuition &amp; Fees
        </li>
        <li class="topic-item" data-query="What scholarships are available?">
          <span class="topic-icon"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="6" />
              <path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11" />
            </svg></span>
          Scholarships
        </li>
        <li class="topic-item" data-query="What are the school rules and policies?">
          <span class="topic-icon"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg></span>
          Policies
        </li>
        <li class="topic-item" data-query="How do I contact the registrar?">
          <span class="topic-icon"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.67 3.42 2 2 0 0 1 3.64 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.64a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
            </svg></span>
          Contact
        </li>
      </ul>

      <div class="sidebar-divider"></div>

      <h3 class="sidebar-title">Chat History</h3>
      <ul class="history-list" id="history-list">
        <li class="history-empty">No previous sessions</li>
      </ul>

    </aside>

    <!-- CHAT AREA -->
    <section class="chat-container" role="main" aria-label="Chat interface">

      <!-- Chat header -->
      <div class="chat-header">
        <div class="bot-info">
          <img src="Iggy.png" alt="Iggy" class="brand-logo-img" />
          <div class="bot-details">
            <span class="bot-name">ICCT Bot</span>
            <span class="bot-status" id="bot-status">
              <span class="status-dot"></span> Online
            </span>
          </div>
        </div>
        <div class="chat-actions">
          <button class="icon-btn" onclick="ChatApp.exportChat()" title="Export chat">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
          </button>
          <button class="icon-btn" onclick="ChatApp.clearChat()" title="New chat">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages-area" id="messages-area" role="log" aria-live="polite" aria-label="Chat messages">
        <!-- Welcome message injected by JS -->
      </div>

      <!-- Suggestions bar -->
      <div class="suggestions-bar" id="suggestions-bar">
        <button class="suggestion-chip" onclick="ChatApp.sendSuggestion(this)">How to enroll?</button>
        <button class="suggestion-chip" onclick="ChatApp.sendSuggestion(this)">Available courses</button>
        <button class="suggestion-chip" onclick="ChatApp.sendSuggestion(this)">Tuition fees</button>
        <button class="suggestion-chip" onclick="ChatApp.sendSuggestion(this)">Scholarship info</button>
        <button class="suggestion-chip" onclick="ChatApp.sendSuggestion(this)">Contact registrar</button>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="user-input" class="user-input" placeholder="Type your question about ICCT Colleges…" rows="1"
            maxlength="500" aria-label="Type your message"></textarea>
          <span class="char-count" id="char-count">0/500</span>
        </div>
        <button class="send-btn" id="send-btn" aria-label="Send message" onclick="ChatApp.sendMessage()">
          ➤
        </button>
      </div>

    </section>
  </main>

  <!-- ===== TOAST NOTIFICATION ===== -->
  <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

  <!-- ===== SCRIPTS ===== -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>

 <script>
  window.addEventListener('DOMContentLoaded', function () {
    const token       = localStorage.getItem('icct_token');
    const loginBtn    = document.getElementById('nav-login-btn');
    const registerBtn = document.getElementById('nav-register-btn');
    const profileMenu = document.getElementById('profile-menu');

    if (token) {
      // Logged in — hide login/register, show profile
      if (loginBtn)    loginBtn.style.display    = 'none';
      if (registerBtn) registerBtn.style.display = 'none';
      if (profileMenu) profileMenu.style.display = 'flex';

      // Try to decode user info from localStorage
      const firstName = localStorage.getItem('icct_first_name') || 'User';
      const email     = localStorage.getItem('icct_email') || '';

      const nameEl  = document.getElementById('profile-name');
      const fullEl  = document.getElementById('profile-fullname');
      const emailEl = document.getElementById('profile-email');

      if (nameEl)  nameEl.textContent  = firstName;
      if (fullEl)  fullEl.textContent  = firstName;
      if (emailEl) emailEl.textContent = email;

    } else {
      // Guest — hide profile menu completely
      if (loginBtn)    loginBtn.style.display    = '';
      if (registerBtn) registerBtn.style.display = '';
      if (profileMenu) profileMenu.style.display = 'none';
    }
  });
</script>

</body>
</html>
