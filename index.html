<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IGGY – ICCT Chatbot Support</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>"/>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
  <a href="index.html" class="header-brand" style="text-decoration:none; color:inherit;">
      <img src="Iggy.png" alt="Iggy" class="welcome-icon-img"/>
      <div class="brand-text">
        <span class="brand-name">IGGY</span>
        <span class="brand-tagline">ICCT Chatbot Support</span>
      </div>
    </a>
    <nav class="header-nav">
      <a href="about.html" class="nav-link" data-page="about">About</a>
      <div class="profile-menu" id="profile-menu">
        <button class="profile-btn" id="profile-btn" onclick="ChatApp.toggleProfile()">
          <div class="profile-avatar" id="profile-avatar">👤</div>
          <span id="profile-name">Guest</span> ▾
        </button>
        <div class="profile-dropdown" id="profile-dropdown">
          <div class="profile-card">
            <div class="profile-avatar-lg" id="profile-avatar-lg">👤</div>
            <div class="profile-info">
              <div class="profile-fullname" id="profile-fullname">Guest User</div>
              <div class="profile-email" id="profile-email">—</div>
              <div class="profile-studentid" id="profile-studentid"></div>
            </div>
          </div>
          <div class="profile-divider"></div>
          <button class="profile-logout" onclick="ChatApp.logout()">🚪 Logout</button>
        </div>
      </div>
    </nav>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h3 class="sidebar-title">Quick Topics</h3>
      <ul class="topic-list" id="topic-list">
        <li class="topic-item" data-query="How do I enroll at ICCT Colleges?">🎓 Enrollment</li>
        <li class="topic-item" data-query="What are the admission requirements?">📋 Requirements</li>
        <li class="topic-item" data-query="What courses are available at ICCT?">📚 Courses</li>
        <li class="topic-item" data-query="What is the class schedule format?">🗓️ Schedules</li>
        <li class="topic-item" data-query="What are the tuition fees and payment options?">💰 Tuition & Fees</li>
        <li class="topic-item" data-query="What scholarships are available?">🏅 Scholarships</li>
        <li class="topic-item" data-query="What are the school rules and policies?">📜 Policies</li>
        <li class="topic-item" data-query="How do I contact the registrar?">📞 Contact</li>
      </ul>

      <div class="sidebar-divider"></div>

      <h3 class="sidebar-title">Chat History</h3>
      <ul class="history-list" id="history-list">
        <li class="history-empty">No previous sessions</li>
      </ul>

      <button class="clear-btn" id="clear-btn" onclick="ChatApp.clearChat()">
        🗑️ Clear Chat
      </button>
    </aside>

    <!-- CHAT AREA -->
    <section class="chat-container" role="main" aria-label="Chat interface">

      <!-- Chat header -->
      <div class="chat-header">
        <div class="bot-info">
          <img src="Iggy.png" alt="Iggy" class="brand-logo-img"/>
          <div class="bot-details">
            <span class="bot-name">ICCT Bot</span>
            <span class="bot-status" id="bot-status">
              <span class="status-dot"></span> Online
            </span>
          </div>
        </div>
        <div class="chat-actions">
          <button class="icon-btn" onclick="ChatApp.exportChat()" title="Export chat">⬇️</button>
          <button class="icon-btn" onclick="ChatApp.clearChat()" title="New chat">🔄</button>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages-area" id="messages-area" role="log" aria-live="polite" aria-label="Chat messages">
        <!-- Welcome message injected by JS -->
      </div>

      <!-- Suggestions bar -->
      <div class="suggestions-bar" id="suggestions-bar">
        <button class="suggestion-chip" onclick="ChatApp.sendSuggestion(this)">How to enroll?</button>
        <button class="suggestion-chip" onclick="ChatApp.sendSuggestion(this)">Available courses</button>
        <button class="suggestion-chip" onclick="ChatApp.sendSuggestion(this)">Tuition fees</button>
        <button class="suggestion-chip" onclick="ChatApp.sendSuggestion(this)">Scholarship info</button>
        <button class="suggestion-chip" onclick="ChatApp.sendSuggestion(this)">Contact registrar</button>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="user-input"
            class="user-input"
            placeholder="Type your question about ICCT Colleges…"
            rows="1"
            maxlength="500"
            aria-label="Type your message"
          ></textarea>
          <span class="char-count" id="char-count">0/500</span>
        </div>
        <button class="send-btn" id="send-btn" aria-label="Send message" onclick="ChatApp.sendMessage()">
          ➤
        </button>
      </div>

    </section>
  </main>

  <!-- ===== TOAST NOTIFICATION ===== -->
  <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

  <style>
    .profile-menu { position: relative; }
    .profile-btn {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      color: #fff; border-radius: 20px;
      padding: 5px 12px 5px 5px;
      cursor: pointer; font-size: 13px; font-weight: 500;
      transition: background .18s;
    }
    .profile-btn:hover { background: rgba(255,255,255,.25); }
    .profile-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }
    .profile-dropdown {
      display: none; position: absolute; right: 0; top: calc(100% + 8px);
      background: #fff; border: 1px solid var(--border);
      border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.12);
      min-width: 240px; z-index: 200; overflow: hidden;
    }
    .profile-dropdown.open { display: block; }
    .profile-card {
      display: flex; align-items: center; gap: 12px; padding: 16px;
    }
    .profile-avatar-lg {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--primary); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; flex-shrink: 0;
    }
    .profile-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .profile-fullname { font-size: 14px; font-weight: 700; color: var(--text); }
    .profile-email { font-size: 12px; color: var(--text-muted); word-break: break-all; }
    .profile-studentid { font-size: 11px; color: var(--text-light); }
    .profile-divider { border: none; border-top: 1px solid var(--border); }
    .profile-logout {
      width: 100%; padding: 12px 16px; background: none; border: none;
      text-align: left; font-size: 13px; color: var(--danger);
      cursor: pointer; transition: background .18s;
    }
    .profile-logout:hover { background: #fff0f0; }
  </style>

  <!-- ===== SCRIPTS ===== -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
